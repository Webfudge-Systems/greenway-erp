# Used by Railway Nixpacks when Root Directory = apps/api

providers = ["...", "python"]

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
# python3 + gcc: @strapi/strapi pulls better-sqlite3; node-gyp needs these to compile on Linux
nixPkgs = ["nodejs_20", "vips", "python3", "gcc", "gnumake"]
aptPkgs = ["...", "build-essential"]

[phases.install]
# Root Directory = apps/api → /app is this folder only. Postgres at runtime; sqlite still installs via Strapi.
cmds = ["npm install --omit=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
