# Used by Railway Nixpacks when Root Directory = apps/api

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
nixPkgs = ["nodejs_20", "vips"]

[phases.install]
# Monorepo root lockfile; omit dev deps (better-sqlite3 is local SQLite only).
cmds = ["cd ../.. && npm ci --omit=dev --workspace=@greenways/api"]

[phases.build]
cmds = ["cd ../.. && npm run build --workspace=@greenways/api"]

[start]
cmd = "npm run start"
