# Railway config when Root Directory = apps/api (same pattern as webfudge-platform apps/backend)
# Override dashboard defaults that use --workspace=@greenways/api (monorepo root is not in the container).

[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/admin"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
