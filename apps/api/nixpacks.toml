# Used by Railway Nixpacks when Root Directory = apps/api

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
nixPkgs = ["nodejs_20", "vips"]

[phases.install]
# Root Directory = apps/api → /app is this folder only. Omit dev (better-sqlite3 = local SQLite).
cmds = ["npm install --omit=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
